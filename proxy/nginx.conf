events {
    worker_connections 1024;
}

http {
    server_tokens off;
    client_max_body_size 12m;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Canonical WebSocket upgrade support. $connection_upgrade resolves to
    # "upgrade" when the request carries an Upgrade header and "close"
    # otherwise. Location blocks forwarding WebSocket traffic use this
    # instead of a hardcoded "upgrade" so plain HTTP requests that hit the
    # same location don't break.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    include /etc/nginx/conf.d/*.conf;
}

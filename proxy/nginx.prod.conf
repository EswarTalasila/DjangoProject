events {
    worker_connections 1024;
}

http {
    server_tokens off;
    client_max_body_size 12m;

    map $host $backend_host {
        default $host;
        localhost 127-0-0-1.nip.io;
        127.0.0.1 127-0-0-1.nip.io;
    }

    # =====================================================================
    # Production upstreams (eel-network-prod)
    # =====================================================================
    upstream frontend_prod {
        server frontend-prod:3000;
    }

    upstream backend_prod {
        server backend-prod:8000;
    }

    # =====================================================================
    # Development upstreams (eel-network)
    # =====================================================================
    upstream frontend_dev {
        server frontend:3000;
    }

    upstream backend_dev {
        server backend:8000;
    }

    # =====================================================================
    # HTTP → HTTPS redirect (prod)
    # =====================================================================
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # =====================================================================
    # Production — :443
    # =====================================================================
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Protected media serving via X-Accel-Redirect (FR-15 IMG-CN-11)
        location /internal/media/ {
            internal;
            alias /app/media/;
        }

        location /api/v1/ {
            proxy_pass http://backend_prod;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location /admin/ {
            proxy_pass http://backend_prod;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location /static/ {
            proxy_pass http://backend_prod;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location / {
            proxy_pass http://frontend_prod;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }

    # =====================================================================
    # Development — :8443 (only works when dev profile is running)
    # =====================================================================
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /api/v1/ {
            proxy_pass http://backend_dev;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location /admin/ {
            proxy_pass http://backend_dev;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location /static/ {
            proxy_pass http://backend_dev;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location / {
            proxy_pass http://frontend_dev;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}

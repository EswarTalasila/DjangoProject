events {
    worker_connections 1024;
}

http {
    server_tokens off;
    client_max_body_size 12m;

    # Local production demo convenience:
    # normalize localhost/127.0.0.1 requests to an allowlisted host expected by
    # strict production Django settings.
    map $host $backend_host {
        default $host;
        localhost 127-0-0-1.nip.io;
        127.0.0.1 127-0-0-1.nip.io;
    }

    upstream frontend {
        server frontend-prod:3000;
    }

    upstream backend {
        server backend-prod:8000;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Protected media serving via X-Accel-Redirect (FR-15 IMG-CN-11)
        location /internal/media/ {
            internal;
            alias /app/media/;
        }

        location /api/v1/ {
            proxy_pass http://backend;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # Django admin + static assets
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location /static/ {
            proxy_pass http://backend;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}

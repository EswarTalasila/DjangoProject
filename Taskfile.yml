version: "3"

tasks:
  default:
    desc: Show grouped command help
    cmds:
      - task: help

  help:
    desc: Show grouped command help
    silent: true
    cmds:
      - |
        cat <<'EOF'
        Task Interface

        Env
          task env:local        -> set root topology for localhost routing
          task env:server       -> set root topology for server/domain routing
          task env:init         -> sync root .env and rewrite runtime env files

        Up
          task up:dev           -> validate env, ensure proxy, start dev stack
          task up:test          -> validate env, ensure proxy, start test stack
          task up:prod          -> validate env, ensure proxy, start prod stack

        Down
          task down:dev         -> stop dev stack without removing volumes
          task down:test        -> stop test stack without removing volumes
          task down:prod        -> stop prod stack without removing volumes

        Runtime
          task status:dev       -> show dev stack state
          task status:test      -> show test stack state
          task status:prod      -> show prod stack state
          task logs:dev         -> follow dev stack logs
          task logs:test        -> follow test stack logs
          task logs:prod        -> follow prod stack logs
          task restart:dev      -> restart dev stack containers
          task restart:test     -> restart test stack containers
          task restart:prod     -> restart prod stack containers
          task rebuild:dev      -> rebuild and recreate dev app containers
          task rebuild:test     -> rebuild and recreate test app containers
          task rebuild:prod     -> rebuild and recreate prod app containers

        Test
          task test             -> ensure testing stack and run all tests
          task test:backend     -> ensure testing stack and run backend tests
          task test:frontend    -> ensure testing stack and run frontend tests

        Dangerous
          CONFIRM_DESTROY_EELAB=EELAB task destroy:all
                                -> wipe all EElab containers, volumes, and proxy state
        EOF

  _check:docker:
    internal: true
    desc: Verify Docker daemon is running
    preconditions:
      - sh: docker info >/dev/null 2>&1
        msg: Docker is not running. Start Docker before running EElab tasks.

  _check:env:dev:
    internal: true
    desc: Validate generated development env file
    cmds:
      - ./scripts/tasks/check-env.sh dev

  _check:env:test:
    internal: true
    desc: Validate generated testing env file
    cmds:
      - ./scripts/tasks/check-env.sh test

  _check:env:prod:
    internal: true
    desc: Validate generated production env file
    cmds:
      - ./scripts/tasks/check-env.sh prod

  _check:proxy:
    internal: true
    desc: Check whether the shared proxy stack is healthy (read-only)
    cmds:
      - ./scripts/tasks/status.sh proxy | grep -q 'state=running_healthy'

  _ensure:proxy:
    internal: true
    desc: Ensure shared proxy stack is running
    cmds:
      - ./scripts/tasks/up.sh proxy

  _ensure:test-stack:
    internal: true
    desc: Ensure the testing stack is prepared and running
    cmds:
      - task: _check:docker
      - ./scripts/tasks/prepare-env.sh test
      - task: _check:env:test
      - task: _ensure:proxy
      - ./scripts/tasks/up.sh test

  env:local:
    desc: Set root env topology for localhost development
    cmds:
      - ./scripts/tasks/set-env-target.sh local

  env:server:
    desc: Set root env topology for server/domain routing
    cmds:
      - ./scripts/tasks/set-env-target.sh server

  env:init:
    desc: Sync root .env with template and rewrite all runtime env files
    cmds:
      - ./scripts/tasks/prepare-env.sh all

  up:dev:
    desc: Validate env, ensure proxy, and start the development stack
    cmds:
      - task: _check:docker
      - ./scripts/tasks/prepare-env.sh dev
      - task: _check:env:dev
      - task: _ensure:proxy
      - ./scripts/tasks/up.sh dev

  up:test:
    desc: Validate env, ensure proxy, and start the testing stack
    cmds:
      - task: _ensure:test-stack

  up:prod:
    desc: Validate env, ensure proxy, and start the production stack
    cmds:
      - task: _check:docker
      - ./scripts/tasks/prepare-env.sh prod
      - task: _check:env:prod
      - task: _ensure:proxy
      - ./scripts/tasks/up.sh prod

  down:dev:
    desc: Stop the development stack without removing volumes
    cmds:
      - task: _check:docker
      - ./scripts/tasks/down.sh dev

  down:test:
    desc: Stop the testing stack without removing volumes
    cmds:
      - task: _check:docker
      - ./scripts/tasks/down.sh test

  down:prod:
    desc: Stop the production stack without removing volumes
    cmds:
      - task: _check:docker
      - ./scripts/tasks/down.sh prod

  status:dev:
    desc: Show development stack state
    cmds:
      - task: _check:docker
      - ./scripts/tasks/status.sh dev

  status:test:
    desc: Show testing stack state
    cmds:
      - task: _check:docker
      - ./scripts/tasks/status.sh test

  status:prod:
    desc: Show production stack state
    cmds:
      - task: _check:docker
      - ./scripts/tasks/status.sh prod

  logs:dev:
    desc: Follow development stack logs
    cmds:
      - task: _check:docker
      - ./scripts/tasks/logs.sh dev

  logs:test:
    desc: Follow testing stack logs
    cmds:
      - task: _check:docker
      - ./scripts/tasks/logs.sh test

  logs:prod:
    desc: Follow production stack logs
    cmds:
      - task: _check:docker
      - ./scripts/tasks/logs.sh prod

  restart:dev:
    desc: Restart development stack containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/restart.sh dev

  restart:test:
    desc: Restart testing stack containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/restart.sh test

  restart:prod:
    desc: Restart production stack containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/restart.sh prod

  rebuild:dev:
    desc: Rebuild and recreate development app containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/rebuild.sh dev

  rebuild:test:
    desc: Rebuild and recreate testing app containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/rebuild.sh test

  rebuild:prod:
    desc: Rebuild and recreate production app containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/rebuild.sh prod

  test:
    desc: Ensure testing stack and run backend plus frontend tests
    cmds:
      - task: _ensure:test-stack
      - ./scripts/tasks/test.sh all

  test:backend:
    desc: Ensure testing stack and run backend tests
    cmds:
      - task: _ensure:test-stack
      - ./scripts/tasks/test.sh backend

  test:frontend:
    desc: Ensure testing stack and run frontend tests
    cmds:
      - task: _ensure:test-stack
      - ./scripts/tasks/test.sh frontend

  destroy:all:
    desc: Destroy all EElab containers, volumes, and proxy state
    cmds:
      - CONFIRM_DESTROY_EELAB=EELAB ./scripts/tasks/destroy-all.sh

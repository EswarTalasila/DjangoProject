version: "3"

tasks:
  default:
    desc: Show grouped command help
    cmds:
      - task: help

  help:
    desc: Show grouped command help
    silent: true
    cmds:
      - |
        BOLD="$(printf '\033[1m')"
        DIM="$(printf '\033[2m')"
        BLUE="$(printf '\033[34m')"
        CYAN="$(printf '\033[36m')"
        YELLOW="$(printf '\033[33m')"
        RED="$(printf '\033[31m')"
        RESET="$(printf '\033[0m')"

        print_section() {
          printf '\n%s%s%s\n' "$BLUE" "$1" "$RESET"
        }

        print_cmd() {
          printf '  %s%-36s%s %s%s%s\n' "$CYAN" "$1" "$RESET" "$DIM" "$2" "$RESET"
        }

        printf '%sTask Interface%s\n' "$BOLD" "$RESET"
        printf '%sLiteral commands only. One source of truth for env, compose, proxy, and tests.%s\n' "$DIM" "$RESET"

        print_section "Env"
        print_cmd "task env:local" "set root topology for localhost routing"
        print_cmd "task env:server" "set root topology for server/domain routing"
        print_cmd "task env:init" "sync root .env and rewrite runtime env files"

        print_section "Up"
        print_cmd "task up:<dev|test|prod>" "validate env, ensure proxy, start the stack"

        print_section "Down"
        print_cmd "task down:<dev|test|prod>" "stop the stack without removing volumes"

        print_section "Runtime"
        print_cmd "task status:<dev|test|prod>" "show stack state"
        print_cmd "task logs:<dev|test|prod>" "follow stack logs"
        print_cmd "task restart:<dev|test|prod>" "restart stack containers"
        print_cmd "task rebuild:<dev|test|prod>" "rebuild and recreate app containers"

        print_section "Test"
        print_cmd "task test[:backend|:frontend]" "ensure testing stack and run tests"

        print_section "Seed"
        print_cmd "task seed:account -- <role> [--profile dev|test]" "provision deterministic account(s)"
        print_cmd "task seed:data -- [--profile dev|test]" "seed deterministic demo data"

        print_section "Init"
        print_cmd "task ensure:admin:<dev|test|prod>" "migrate + collectstatic + ensure admin"

        print_section "Dangerous"
        printf '  %s%-36s%s %s%s%s\n' "$RED" "task destroy:all" "$RESET" "$DIM" "wipe all EElab containers, volumes, and proxy state" "$RESET"
        printf '  %s%-36s%s %s%s%s\n' "" "" "" "$YELLOW" "requires y/N confirmation and exact phrase EELab" "$RESET"

  _check:docker:
    internal: true
    desc: Verify Docker daemon is running
    preconditions:
      - sh: docker info >/dev/null 2>&1
        msg: Docker is not running. Start Docker before running EElab tasks.

  _check:env:dev:
    internal: true
    desc: Validate generated development env file
    cmds:
      - ./scripts/tasks/check-env.sh dev

  _check:env:test:
    internal: true
    desc: Validate generated testing env file
    cmds:
      - ./scripts/tasks/check-env.sh test

  _check:env:prod:
    internal: true
    desc: Validate generated production env file
    cmds:
      - ./scripts/tasks/check-env.sh prod

  _check:proxy:
    internal: true
    desc: Check whether the shared proxy stack is healthy (read-only)
    cmds:
      - ./scripts/tasks/status.sh proxy | grep -q 'state=running_healthy'

  _ensure:proxy:
    internal: true
    desc: Ensure shared proxy stack is running
    cmds:
      - ./scripts/tasks/up.sh proxy

  _ensure:test-stack:
    internal: true
    desc: Ensure the testing stack is prepared and running
    cmds:
      - task: _check:docker
      - ./scripts/tasks/prepare-env.sh test
      - task: _check:env:test
      - task: _ensure:proxy
      - ./scripts/tasks/up.sh test
      - ./scripts/tasks/ensure-admin.sh test

  _ensure:admin:dev:
    internal: true
    desc: Migrate, collect static, and ensure admin exists in the dev stack
    cmds:
      - ./scripts/tasks/ensure-admin.sh dev

  _ensure:admin:test:
    internal: true
    desc: Migrate, collect static, and ensure admin exists in the test stack
    cmds:
      - ./scripts/tasks/ensure-admin.sh test

  _ensure:admin:prod:
    internal: true
    desc: Migrate, collect static, and ensure admin exists in the prod stack
    cmds:
      - ./scripts/tasks/ensure-admin.sh prod

  env:local:
    desc: Set root env topology for localhost development
    cmds:
      - ./scripts/tasks/set-env-target.sh local

  env:server:
    desc: Set root env topology for server/domain routing
    cmds:
      - ./scripts/tasks/set-env-target.sh server

  env:init:
    desc: Sync root .env with template and rewrite all runtime env files
    cmds:
      - ./scripts/tasks/prepare-env.sh all

  up:dev:
    desc: Validate env, ensure proxy, start the development stack, and initialize backend
    cmds:
      - task: _check:docker
      - ./scripts/tasks/prepare-env.sh dev
      - task: _check:env:dev
      - task: _ensure:proxy
      - ./scripts/tasks/up.sh dev
      - task: _ensure:admin:dev

  up:test:
    desc: Validate env, ensure proxy, start the testing stack, and initialize backend
    cmds:
      - task: _ensure:test-stack

  up:prod:
    desc: Validate env, ensure proxy, start the production stack, and initialize backend
    cmds:
      - task: _check:docker
      - ./scripts/tasks/prepare-env.sh prod
      - task: _check:env:prod
      - task: _ensure:proxy
      - ./scripts/tasks/up.sh prod
      - task: _ensure:admin:prod

  ensure:admin:dev:
    desc: Run migrations, collectstatic, and ensure admin in dev (stack must be up)
    cmds:
      - task: _ensure:admin:dev

  ensure:admin:test:
    desc: Run migrations, collectstatic, and ensure admin in test (stack must be up)
    cmds:
      - task: _ensure:admin:test

  ensure:admin:prod:
    desc: Run migrations, collectstatic, and ensure admin in prod (stack must be up)
    cmds:
      - task: _ensure:admin:prod

  down:dev:
    desc: Stop the development stack without removing volumes
    cmds:
      - task: _check:docker
      - ./scripts/tasks/down.sh dev

  down:test:
    desc: Stop the testing stack without removing volumes
    cmds:
      - task: _check:docker
      - ./scripts/tasks/down.sh test

  down:prod:
    desc: Stop the production stack without removing volumes
    cmds:
      - task: _check:docker
      - ./scripts/tasks/down.sh prod

  status:dev:
    desc: Show development stack state
    cmds:
      - task: _check:docker
      - ./scripts/tasks/status.sh dev

  status:test:
    desc: Show testing stack state
    cmds:
      - task: _check:docker
      - ./scripts/tasks/status.sh test

  status:prod:
    desc: Show production stack state
    cmds:
      - task: _check:docker
      - ./scripts/tasks/status.sh prod

  logs:dev:
    desc: Follow development stack logs
    cmds:
      - task: _check:docker
      - ./scripts/tasks/logs.sh dev

  logs:test:
    desc: Follow testing stack logs
    cmds:
      - task: _check:docker
      - ./scripts/tasks/logs.sh test

  logs:prod:
    desc: Follow production stack logs
    cmds:
      - task: _check:docker
      - ./scripts/tasks/logs.sh prod

  restart:dev:
    desc: Restart development stack containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/restart.sh dev

  restart:test:
    desc: Restart testing stack containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/restart.sh test

  restart:prod:
    desc: Restart production stack containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/restart.sh prod

  rebuild:dev:
    desc: Rebuild and recreate development app containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/rebuild.sh dev

  rebuild:test:
    desc: Rebuild and recreate testing app containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/rebuild.sh test

  rebuild:prod:
    desc: Rebuild and recreate production app containers
    cmds:
      - task: _check:docker
      - ./scripts/tasks/rebuild.sh prod

  test:
    desc: Ensure testing stack and run backend plus frontend tests
    cmds:
      - task: _ensure:test-stack
      - ./scripts/tasks/test.sh all

  test:backend:
    desc: Ensure testing stack and run backend tests
    cmds:
      - task: _ensure:test-stack
      - ./scripts/tasks/test.sh backend

  test:frontend:
    desc: Ensure testing stack and run frontend tests
    cmds:
      - task: _ensure:test-stack
      - ./scripts/tasks/test.sh frontend

  seed:account:
    desc: Ensure backend services and provision deterministic seeded account(s)
    cmds:
      - task: _check:docker
      - ./scripts/tasks/seed-account.sh {{.CLI_ARGS}}

  seed:data:
    desc: Ensure backend services and seed deterministic demo data
    cmds:
      - task: _check:docker
      - ./scripts/tasks/seed-data.sh {{.CLI_ARGS}}

  destroy:all:
    desc: Destroy all EElab containers, volumes, and proxy state
    cmds:
      - ./scripts/tasks/destroy-all.sh

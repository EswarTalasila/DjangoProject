# =============================================================================
# EE-Lab Docker Compose - Development Environment
# =============================================================================
# This file orchestrates all services needed for local development.
#
# QUICK START:
#   1. cp .env.template .env && edit .env
#   2. docker compose up -d
#   3. Open http://localhost:4200 (frontend) or http://localhost:8000 (API)
#
# COMMON COMMANDS:
#   docker compose up -d              # Start all services
#   docker compose up -d --build      # Rebuild images and start
#   docker compose down               # Stop all services
#   docker compose down -v            # Stop and remove volumes (reset DB)
#   docker compose logs -f backend    # Follow backend logs
#   docker compose exec backend pytest # Run backend tests
#
# OPTIONAL PROFILES:
#   docker compose --profile e2e up   # Include E2E testing container
#   docker compose --profile proxy up # Include Traefik reverse proxy
#
# SERVICES:
#   - database:     PostgreSQL 16 (port 5432)
#   - backend:      Django REST API (port 8000)
#   - frontend:     Angular dev server (port 4200)
#   - frontend-e2e: Playwright E2E tests (profile: e2e)
#   - traefik:      Reverse proxy (profile: proxy, ports 80/8080)
# =============================================================================

services:
  # ==========================================================================
  # Database
  # ==========================================================================
  database:
    image: postgres:16-alpine
    container_name: eel-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datadash}
      POSTGRES_USER: ${POSTGRES_USER:-datadash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datadash} -d ${POSTGRES_DB:-datadash}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eel-network
  pgadmin: # <--- FIXED: Aligned with 'database'
    image: dpage/pgadmin4:9.8
    container_name: eel-pgadmin # Good practice to add this
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: demo@example.com
      PGADMIN_DEFAULT_PASSWORD: secret
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    networks:
      - eel-network
    depends_on:
      - database
  # ==========================================================================
  # Backend (Django)
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eel-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-datadash}:${POSTGRES_PASSWORD:-localdev}@database:5432/${POSTGRES_DB:-datadash}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-local-dev-secret-change-in-prod}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-true}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,eel-backend,eel-frontend}
      - DJANGO_CORS_ALLOWED_ORIGINS=${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-eel-backend}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_TRACE_FILE=${OTEL_TRACE_FILE:-/app/traces/traces.jsonl}
    volumes:
      - ./backend/src:/app/src:cached
      - ./backend/tests:/app/tests:cached
      - ./backend/pyproject.toml:/app/pyproject.toml:cached
      - ./scripts:/app/scripts:cached
      - ./Docs:/app/Docs:cached
      - ./Docs/diagrams/otel:/app/traces:cached
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - eel-network
    command: >
      sh -c "python src/manage.py migrate &&
             python src/manage.py runserver 0.0.0.0:8000"

  # ==========================================================================
  # Frontend (Angular) - Development
  # ==========================================================================
  # Hot reload is enabled via volume mount. The node_modules volume persists
  # dependencies across container restarts. npm install runs on startup to
  # ensure dependencies are in sync with package.json (the volume may contain
  # stale packages if package.json was updated).
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: eel-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - eel-network
    environment:
      - PROXY_TARGET=http://backend:8000
      - CHROME_BIN=/usr/bin/chromium
    command: sh -c "npm install && npm start -- --host 0.0.0.0 --poll 2000 --disable-host-check"

  # ==========================================================================
  # Frontend E2E (Playwright)
  # ==========================================================================
  frontend-e2e:
    image: mcr.microsoft.com/playwright:v1.57.0-jammy
    container_name: eel-frontend-e2e
    profiles:
      - e2e
    working_dir: /work/frontend
    environment:
      - E2E_BASE_URL=${E2E_BASE_URL:-http://localhost:4200}
      - E2E_API_URL=${E2E_API_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend:/work/frontend:cached
      - playwright_node_modules:/work/frontend/node_modules
    depends_on:
      - frontend
      - backend
      - database
    networks:
      - eel-network

  # ==========================================================================
  # Reverse Proxy (Traefik) - Optional for dev
  # ==========================================================================
  traefik:
    image: traefik:v3.0
    container_name: eel-traefik
    restart: unless-stopped
    profiles:
      - proxy
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - eel-network

volumes:
  postgres_data:
  frontend_node_modules:
  playwright_node_modules:

networks:
  eel-network:
    driver: bridge

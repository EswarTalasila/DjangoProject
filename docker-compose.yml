# =============================================================================
# EE-Lab Docker Compose - Development Environment
# =============================================================================
# This file orchestrates all services needed for local development.
#
# QUICK START:
#   1. cp .env.template .env && edit .env
#   2. docker compose up -d
#   3. Open http://localhost:3000 (frontend) or http://localhost:8000 (API)
#
# COMMON COMMANDS:
#   docker compose up -d              # Start all services
#   docker compose up -d --build      # Rebuild images and start
#   docker compose down               # Stop all services
#   docker compose down -v            # Stop and remove volumes (reset DB)
#   docker compose logs -f backend    # Follow backend logs
#   docker compose exec backend pytest # Run backend tests
#
# PROFILE SETS:
#   --profile development : database + backend + frontend
#   --profile testing     : database + backend + frontend + pgadmin + otel + jaeger
#   --profile prod        : database + backend-prod + frontend-prod + nginx-prod
#   --profile e2e         : Playwright runner (used with testing)
#   --profile proxy       : Dev/testing reverse proxy overlay
#
# SERVICES:
#   - database:       PostgreSQL 17 (shared across profiles)
#   - backend:        Django dev/testing API (profiles: development/testing)
#   - frontend:       Next.js dev server (profiles: development/testing)
#   - pgadmin:        Database management UI (profile: testing)
#   - otel-collector: OTel span receiver (profile: testing)
#   - jaeger:         Trace visualization UI (profile: testing)
#   - frontend-e2e:   Playwright E2E tests (profile: e2e)
#   - nginx:          Reverse proxy overlay (profile: proxy)
#   - backend-prod:   Django + Gunicorn (profile: prod, no exposed port)
#   - frontend-prod:  Next.js standalone build (no exposed port)
#   - nginx-prod:     Reverse proxy (port 80)
# =============================================================================

services:
  # ==========================================================================
  # Database
  # ==========================================================================
  database:
    image: postgres:17-alpine
    container_name: eel-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datadash}
      POSTGRES_USER: ${POSTGRES_USER:-datadash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-datadash} -d ${POSTGRES_DB:-datadash}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eel-network
  # ==========================================================================
  # pgAdmin - Database Management UI
  # Access at http://localhost:5050
  # Login: demo@example.com / secret
  # ==========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eel-pgadmin
    profiles:
      - testing
    user: root
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: demo@example.com
      PGADMIN_DEFAULT_PASSWORD: secret
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      # Reload server definitions on every container restart
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      # Use pgpass file for auto-login to database servers
      PGPASS_FILE: /var/lib/pgadmin/pgpass
      # Pass database credentials for pgpass generation
      POSTGRES_USER: ${POSTGRES_USER:-datadash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      # Auto-register database server on startup
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    # Generate pgpass from environment variables at startup
    entrypoint: >
      /bin/sh -c "
      echo \"database:5432:*:$$POSTGRES_USER:$$POSTGRES_PASSWORD\" > /var/lib/pgadmin/pgpass &&
      chmod 600 /var/lib/pgadmin/pgpass &&
      chown 5050:5050 /var/lib/pgadmin/pgpass &&
      /entrypoint.sh
      "
    networks:
      - eel-network
    depends_on:
      - database
  # ==========================================================================
  # Backend (Django)
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eel-backend
    restart: unless-stopped
    profiles:
      - development
      - testing
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-datadash}:${POSTGRES_PASSWORD:-change-me}@database:5432/${POSTGRES_DB:-datadash}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-local-dev-secret-change-in-prod}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,eel-backend,eel-frontend}
      - DJANGO_CORS_ALLOWED_ORIGINS=${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - OTEL_ENABLED=${OTEL_ENABLED:-}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-eel-backend}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_TRACE_FILE=${OTEL_TRACE_FILE:-/app/traces/traces.jsonl}
      - MEDIA_ROOT=/app/media
      # Admin account seeding (used by ensure_admin management command)
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-Admin}
    volumes:
      - ./backend/src:/app/src:cached
      - ./backend/tests:/app/tests:cached
      - ./backend/pyproject.toml:/app/pyproject.toml:cached
      - ./scripts:/app/scripts:cached
      - ./Docs:/app/Docs:cached
      - ./Docs/diagrams/otel:/app/traces:cached
      # Infrastructure config files (read-only) for FR-13 contract tests
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./otel-collector-config.yaml:/app/otel-collector-config.yaml:ro
      - ./.pre-commit-config.yaml:/app/.pre-commit-config.yaml:ro
      - ./Deployment:/app/Deployment:ro
      - ./backend/Dockerfile:/app/Dockerfile:ro
      - ./backend/media:/app/media:cached
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - eel-network
    command: >
      sh -c "python src/manage.py migrate &&
             if [ \"$${ENVIRONMENT}\" = \"production\" ]; then python src/manage.py collectstatic --noinput; fi &&
             python src/manage.py ensure_admin &&
             if [ \"$${ENVIRONMENT}\" = \"testing\" ]; then python src/manage.py seed_e2e; fi &&
             python src/manage.py runserver 0.0.0.0:8000"

  # ==========================================================================
  # Frontend (Next.js) - Development
  # ==========================================================================
  # Hot reload is enabled via volume mount. The node_modules volume persists
  # dependencies across container restarts. npm ci runs only when required
  # tool binaries are missing (protects against stale/partial node_modules
  # after package-lock updates). A separate npm cache volume reduces repeated
  # download time when node_modules is rebuilt.
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: eel-frontend
    restart: unless-stopped
    profiles:
      - development
      - testing
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
      - frontend_npm_cache:/root/.npm
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - eel-network
    environment:
      - PROXY_TARGET=http://backend:8000
      - CHROME_BIN=/usr/bin/chromium
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:8000/api/v1}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    command: >
      sh -c "if [ ! -x node_modules/.bin/next ] || [ ! -x node_modules/.bin/vitest ]; then
               npm ci --prefer-offline --no-audit;
             fi &&
             npm run dev"

  # ==========================================================================
  # Frontend E2E (Playwright)
  # ==========================================================================
  frontend-e2e:
    image: mcr.microsoft.com/playwright:v1.57.0-jammy
    container_name: eel-frontend-e2e
    profiles:
      - e2e
    working_dir: /work/frontend
    environment:
      - E2E_BASE_URL=${E2E_BASE_URL:-http://frontend:3000}
      - E2E_API_URL=${E2E_API_URL:-http://backend:8000/api/v1}
    volumes:
      - ./frontend:/work/frontend:cached
      - playwright_node_modules:/work/frontend/node_modules
    depends_on:
      - frontend
      - backend
      - database
    networks:
      - eel-network

  # ==========================================================================
  # Reverse Proxy (Nginx)
  # ==========================================================================

  nginx:
    image: nginx:latest
    restart: unless-stopped
    container_name: eel-proxy
    profiles:
      - proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/media:/app/media:ro
    depends_on:
      - frontend
      - backend
    networks:
      - eel-network

  # ==========================================================================
  # Backend (Django) - Production
  # ==========================================================================
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eel-backend-prod
    restart: unless-stopped
    profiles:
      - prod
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      - ENVIRONMENT=production
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DJANGO_CORS_ALLOWED_ORIGINS=${DJANGO_CORS_ALLOWED_ORIGINS}
      - DJANGO_CSRF_TRUSTED_ORIGINS=${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      - DJANGO_SECURE_SSL_REDIRECT=${DJANGO_SECURE_SSL_REDIRECT:-true}
      - DJANGO_SESSION_COOKIE_SECURE=${DJANGO_SESSION_COOKIE_SECURE:-true}
      - DJANGO_CSRF_COOKIE_SECURE=${DJANGO_CSRF_COOKIE_SECURE:-true}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OTEL_ENABLED=${OTEL_ENABLED:-}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-eel-backend}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_TRACE_FILE=
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-Admin}
    volumes:
      - media_data:/app/media
    depends_on:
      database:
        condition: service_healthy
    networks:
      - eel-network
    command: >
      sh -c "python src/manage.py migrate &&
             python src/manage.py collectstatic --noinput &&
             python src/manage.py ensure_admin &&
             gunicorn --bind 0.0.0.0:8000 config.wsgi:application"

  # ==========================================================================
  # Frontend (Next.js) - Production
  # ==========================================================================
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    container_name: eel-frontend-prod
    restart: unless-stopped
    profiles:
      - prod
    depends_on:
      - backend-prod
    networks:
      - eel-network
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/v1}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}

  # ==========================================================================
  # Reverse Proxy (Nginx) - Production
  # ==========================================================================
  nginx-prod:
    image: nginx:latest
    container_name: eel-proxy-prod
    restart: unless-stopped
    profiles:
      - prod
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - media_data:/app/media:ro
    depends_on:
      - frontend-prod
      - backend-prod
    networks:
      - eel-network

  # ==========================================================================
  # OTel Collector
  # Receives OTLP spans from backend and forwards to Jaeger.
  # Spec: FR-13 INFRA-UC-05, FR-11 OBS Section 6
  # ==========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: eel-otel-collector
    restart: unless-stopped
    profiles:
      - testing
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - eel-network

  # ==========================================================================
  # Jaeger - Trace Visualization
  # Access at http://localhost:16686
  # Spec: FR-13 INFRA-UC-05, FR-11 OBS Section 6
  # ==========================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: eel-jaeger
    restart: unless-stopped
    profiles:
      - testing
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - eel-network

volumes:
  postgres_data:
  media_data:
  frontend_node_modules:
  frontend_npm_cache:
  playwright_node_modules:

networks:
  eel-network:
    driver: bridge

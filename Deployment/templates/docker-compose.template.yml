# Template: EE Lab Data Dashboard Docker Compose (Traefik + Django + Angular + Postgres)
# Copy to docker-compose.yml and fill in environment values.

services:
  traefik:
    image: traefik:v3.1
    container_name: eel-traefik
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Enable ACME (Let's Encrypt) when ready
      - --certificatesresolvers.le.acme.email=REPLACE_ME
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - app-net

  frontend:
    image: eel-frontend:dev
    container_name: eel-frontend
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`REPLACE_ME_HOST`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
    networks:
      - app-net

  backend:
    image: eel-backend:dev
    container_name: eel-backend
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgres://REPLACE_ME_USER:REPLACE_ME_PASS@database:5432/REPLACE_ME_DB
      - DJANGO_SECRET_KEY=REPLACE_ME_SECRET
      - DJANGO_ALLOWED_HOSTS=REPLACE_ME_HOST
      - DJANGO_CORS_ALLOWED_ORIGINS=https://REPLACE_ME_HOST
      - DJANGO_DEBUG=false
      - OTEL_ENABLED=false
      - OTEL_SERVICE_NAME=eel-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - OTEL_EXPORTER_OTLP_HEADERS=
      - OTEL_TRACE_FILE=/app/traces/traces.jsonl
    depends_on:
      - database
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`REPLACE_ME_HOST`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=le"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    volumes:
      - ./traces:/app/traces
    networks:
      - app-net

  database:
    image: postgres:17-alpine
    container_name: eel-db
    environment:
      - POSTGRES_DB=REPLACE_ME_DB
      - POSTGRES_USER=REPLACE_ME_USER
      - POSTGRES_PASSWORD=REPLACE_ME_PASS
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-net

volumes:
  db-data:

networks:
  app-net:
    driver: bridge

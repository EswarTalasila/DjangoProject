# Template: EE Lab Data Dashboard Docker Compose (Dev with live reload)
# Copy to docker-compose.dev.yml and fill in environment values.

services:
  traefik:
    image: traefik:v3.1
    container_name: eel-traefik-dev
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-net

  frontend:
    image: node:22-slim
    container_name: eel-frontend-dev
    working_dir: /app
    command: ["bash", "-lc", "npm install && npm start -- --host 0.0.0.0 --poll 2000 --disable-host-check"]
    environment:
      - PROXY_TARGET=http://backend:8000
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`REPLACE_ME_HOST`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=4200"
    networks:
      - app-net

  backend:
    image: python:3.12-slim
    container_name: eel-backend-dev
    working_dir: /app
    command: ["bash", "-lc", "python -m venv .venv && . .venv/bin/activate && pip install -r requirements.txt && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"]
    environment:
      - DATABASE_URL=postgres://REPLACE_ME_USER:REPLACE_ME_PASS@database:5432/REPLACE_ME_DB
      - DJANGO_SECRET_KEY=REPLACE_ME_SECRET
      - DJANGO_ALLOWED_HOSTS=REPLACE_ME_HOST,backend,eel-backend,eel-frontend
      - DJANGO_CORS_ALLOWED_ORIGINS=http://REPLACE_ME_HOST
      - DJANGO_DEBUG=true
      - OTEL_ENABLED=false
      - OTEL_SERVICE_NAME=eel-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - OTEL_EXPORTER_OTLP_HEADERS=
      - OTEL_TRACE_FILE=/app/traces/traces.jsonl
    volumes:
      - ../backend:/app
      - ../Docs/diagrams/otel:/app/traces
      - ../scripts:/app/scripts
      - ../Docs:/app/Docs
      - ../backend/pyproject.toml:/app/pyproject.toml
    depends_on:
      - database
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`REPLACE_ME_HOST`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    networks:
      - app-net

  database:
    image: postgres:15
    container_name: eel-db-dev
    environment:
      - POSTGRES_DB=REPLACE_ME_DB
      - POSTGRES_USER=REPLACE_ME_USER
      - POSTGRES_PASSWORD=REPLACE_ME_PASS
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-net

volumes:
  db-data:
  frontend_node_modules:

networks:
  app-net:
    driver: bridge

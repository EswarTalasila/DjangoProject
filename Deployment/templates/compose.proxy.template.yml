services:
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/templates:/etc/nginx/templates:ro
      - ./proxy/ssl:/etc/nginx/ssl:ro
    networks:
      lattice-proxy:
        aliases:
          - proxy

networks:
  lattice-proxy:
    name: lattice-proxy

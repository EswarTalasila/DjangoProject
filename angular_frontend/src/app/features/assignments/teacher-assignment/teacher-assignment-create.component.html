<div class="assignment-create-container">
  <h1>Create Assignment</h1>

  <div class="feedback" *ngIf="feedback">
    <p [class]="feedback.type">{{ feedback.message }}</p>
  </div>

  <h2>Select Assessments</h2>
  <div class="assessment-list">
    <div 
      *ngFor="let assessment of assessments" 
      class="assessment-item"
      [class.selected]="isAssessmentSelected(assessment.id)"
      (click)="toggleAssessment(assessment.id)"
    >
      <div class="assessment-info">
        <h3>{{ assessment.title }}</h3>
      </div>
      <div class="checkbox-wrapper">
        <input 
          type="checkbox" 
          [checked]="isAssessmentSelected(assessment.id)"
          (click)="$event.stopPropagation()"
          (change)="toggleAssessment(assessment.id)"
        />
      </div>
    </div>
  </div>

  <h2>Select Courses</h2>
  <div class="course-list">
    <div 
      *ngFor="let course of courses" 
      class="course-item"
      [class.selected]="isCourseSelected(course.id)"
      (click)="toggleCourse(course.id)"
    >
      <div class="course-info">
        <h3>{{ course.name }}</h3>
      </div>
      <div class="checkbox-wrapper">
        <input 
          type="checkbox" 
          [checked]="isCourseSelected(course.id)"
          (click)="$event.stopPropagation()"
          (change)="toggleCourse(course.id)"
        />
      </div>
    </div>
  </div>

  <h2>Assignment Details</h2>
  <div class="form-row two-col">
    <div>
      <label for="openAt">Opens At</label>
      <input id="openAt" type="datetime-local" [(ngModel)]="openAt" />
    </div>
    <div>
      <label for="dueAt">Due At</label>
      <input id="dueAt" type="datetime-local" [(ngModel)]="dueAt" />
    </div>
  </div>

  <div class="create-button-container">
    <button
      class="create-button"
      [disabled]="!canCreate()"
      (click)="createAssignments()"
    >
      Create {{ selectedAssessmentIds.size * selectedCourseIds.size }} Assignment{{ (selectedAssessmentIds.size * selectedCourseIds.size) !== 1 ? 's' : '' }}
    </button>
  </div>
</div>

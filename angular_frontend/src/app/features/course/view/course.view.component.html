<div class="courses-container">
    <div class="header">
      <h1>My Courses</h1>
      <button class="create-course-btn" (click)="navigateToCreateCourse()">
        Create Course
      </button>
    </div>
  
    <!-- Loading State -->
    <div *ngIf="isLoading" class="empty-state">
      <p>Loading courses...</p>
    </div>
  
    <!-- Empty State -->
    <div *ngIf="!isLoading && courses.length === 0" class="empty-state">
      <h2>No Courses Yet</h2>
      <p>Create your first course to get started!</p>
      <button (click)="navigateToCreateCourse()">Create Course</button>
    </div>
  
    <!-- Courses Grid -->
    <div *ngIf="!isLoading && courses.length > 0" class="courses-grid">
      <div class="course-card" *ngFor="let course of courses">
        <div class="card-header">
          <h3>{{ course.name }}</h3>
        </div>
  
        <div class="card-body">
          <div class="info-row">
            <span class="label">Course ID:</span>
            <span class="value">{{ course.id }}</span>
          </div>
          <!-- Add more course info here if available -->
        </div>
  
        <div class="card-footer">
          <div class="button-group">
            <button 
              class="action-btn primary-btn" 
              (click)="viewStudents(course)"
            >
              View Students
            </button>
            <button 
              class="action-btn danger-btn" 
              (click)="deleteCourse(course)"
            >
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

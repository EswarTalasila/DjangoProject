<div class="students-container">
  <div class="header">
    <div class="header-left">
      <button class="back-button" (click)="goBack()">← Back to Courses</button>
      <h1>Students in {{ courseName || 'Course' }}</h1>
    </div>
    <button class="add-students-btn" (click)="addStudents()">
      Add Students
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="empty-state">
    <p>Loading students...</p>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && students.length === 0" class="empty-state">
    <h2>No Students Yet</h2>
    <p>Add students to this course to get started!</p>
  </div>

  <!-- Students Table -->
  <div *ngIf="!isLoading && students.length > 0" class="students-table-container">
    <table class="students-table">
      <thead>
        <tr>
          <th class="name-column">Name</th>
          <th class="email-column">Email</th>
          <th class="action-column">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let student of students">
          <!-- Display Mode -->
          <ng-container *ngIf="editingStudent?.id !== student.id">
            <td class="name-column">{{ student.name }}</td>
            <td class="email-column">{{ student.username }}</td>
            <td class="action-column">
              <div class="action-buttons">
                <button class="edit-btn" (click)="startEdit(student)">Edit</button>
                <button class="reset-btn" (click)="resetPassword(student)">Reset Password</button>
                <button class="delete-btn" (click)="deleteStudent(student, $event)" title="Delete Student">✕</button>
              </div>
            </td>
          </ng-container>

          <!-- Edit Mode -->
          <ng-container *ngIf="editingStudent?.id === student.id">
            <td class="name-column">
              <input 
                type="text" 
                [(ngModel)]="editForm.name" 
                class="edit-input"
                placeholder="Student Name"
              />
            </td>
            <td class="email-column">
              <input 
                type="email" 
                [(ngModel)]="editForm.username" 
                class="edit-input"
                placeholder="Email"
                disabled
                title="Email cannot be changed"
              />
            </td>
            <td class="action-column">
              <div class="action-buttons">
                <button class="save-btn" (click)="saveEdit()">Save</button>
                <button class="cancel-btn" (click)="cancelEdit()">Cancel</button>
              </div>
            </td>
          </ng-container>
        </tr>
      </tbody>
    </table>
  </div>
</div>

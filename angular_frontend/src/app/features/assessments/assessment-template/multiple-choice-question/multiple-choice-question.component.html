<div class="question-card">
  <div class="question-header">
    <textarea 
      class="question-input auto-expand" 
      placeholder="Multiple Choice Question"
      [(ngModel)]="data.prompt"
      (ngModelChange)="onDataChange()"
      (input)="autoExpand($event)"
    ></textarea>
    <input 
      type="number" 
      class="points-input" 
      placeholder="Points"
      [(ngModel)]="data.maxPoints"
      (ngModelChange)="onDataChange()"
      min="0"
    />
    <button class="delete-btn" (click)="onDelete()">Delete</button>
  </div>

  <div class="image-section">
    <label class="image-upload-btn">
      Add Image
      <input
        type="file"
        accept="image/*"
        (change)="onImageSelected($event)"
        style="display: none"
      />
    </label>
    <span class="image-status">
      {{ data.image ? "Image uploaded" : "No image uploaded" }}
    </span>
  </div>

  <div class="choices-section">
  <div *ngFor="let choice of data.choices; let i = index" class="choice-row">
    <textarea
      class="choice-input auto-expand"
      placeholder="Choice {{ i + 1 }}"
      [(ngModel)]="data.choices[i].prompt"
      (ngModelChange)="onDataChange()"
      (input)="autoExpand($event)"
    ></textarea>
    <input
      type="number"
      class="choice-score-input"
      placeholder="Score"
      [(ngModel)]="data.choices[i].score"
      (ngModelChange)="onDataChange()"
      min="0"
    />
    <button class="delete-choice-btn" (click)="removeChoice(i)">
      Delete
    </button>
  </div>
</div>

  <button class="add-choice-btn" (click)="addChoice()">Add Choice</button>

  <div class="select-all">
    <label>
      <input
        type="checkbox"
        [(ngModel)]="data.selectAll"
        (ngModelChange)="onDataChange()"
      />
      Allow multiple selections (Check all that apply)
    </label>
  </div>
</div>

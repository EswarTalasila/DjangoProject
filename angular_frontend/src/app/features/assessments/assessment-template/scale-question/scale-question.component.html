<div class="question-card">
<div class="question-card">
  <div class="question-header">
    <textarea 
      class="question-input auto-expand" 
      placeholder="Scale question"
      [(ngModel)]="data.prompt"
      (ngModelChange)="onDataChange()"
      (input)="autoExpand($event)"
    ></textarea>
    <input 
      type="number" 
      class="points-input" 
      placeholder="Points"
      [(ngModel)]="data.maxPoints"
      (ngModelChange)="onDataChange()"
      min="0"
    />
    <button class="delete-btn" (click)="onDelete()">Delete</button>
  </div>

  <div class="image-section">
    <label class="image-upload-btn">
      Add Image
      <input 
        type="file" 
        accept="image/*" 
        (change)="onImageSelected($event)"
        style="display: none;"
      />
    </label>
    <span class="image-status">
      {{ data.image ? 'Image uploaded' : 'No image uploaded' }}
    </span>
  </div>

  <div class="scale-inputs">
    <div class="input-group">
      <label>Minimum</label>
      <input 
        type="number" 
        class="scale-input" 
        placeholder="Minimum"
        [(ngModel)]="data.min"
        (ngModelChange)="onDataChange()"
      />
    </div>
    <div class="input-group">
      <label>Maximum</label>
      <input 
        type="number" 
        class="scale-input" 
        placeholder="Maximum"
        [(ngModel)]="data.max"
        (ngModelChange)="onDataChange()"
      />
    </div>
    <div class="input-group">
      <label>Target (for auto-grading)</label>
      <input 
        type="number" 
        class="scale-input" 
        placeholder="Target (optional)"
        [(ngModel)]="data.target"
        (ngModelChange)="onDataChange()"
      />
    </div>
  </div>
</div>

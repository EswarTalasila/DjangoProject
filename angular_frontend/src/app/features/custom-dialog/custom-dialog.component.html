<div *ngIf="dialogConfig" class="dialog-overlay" (click)="close()">
  <div class="dialog-container" (click)="$event.stopPropagation()" [class]="typeClass">
    <div class="dialog-header">
      <span class="dialog-icon">{{ icon }}</span>
      <h3 class="dialog-title">{{ dialogConfig.title }}</h3>
    </div>
    
    <div class="dialog-content">
      <p>{{ dialogConfig.message }}</p>
    </div>
    
    <div class="dialog-actions">
      <ng-container *ngIf="dialogConfig.type === 'confirm'; else singleButton">
        <button 
          class="btn btn-cancel" 
          (click)="cancel()">
          Cancel
        </button>
        <button 
          class="btn btn-confirm" 
          (click)="confirm()">
          Confirm
        </button>
      </ng-container>
      
      <ng-template #singleButton>
        <button 
          class="btn btn-confirm" 
          (click)="close()">
          OK
        </button>
      </ng-template>
    </div>
  </div>
</div>

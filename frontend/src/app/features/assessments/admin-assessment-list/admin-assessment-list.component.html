<div class="container">
  <h1>Assessments</h1>
  <button class="create-button" (click)="createAssessment()"> Create Assessment</button>
  <div *ngIf="assessments.length === 0" class="empty-list">
    <h2>No Assessments Created</h2>
    <p>There are no assessments available at this time.</p>
  </div>
  <div *ngIf="assessments.length > 0" class="list-container">
    <div
      *ngFor="let assessment of assessments"
      class="assessment-card"
    >
      <div class="card-header">
        <h3>{{ assessment.title || "Assessment" }}</h3>
      </div>
      <div class="card-body">
        <button (click)="openAssessment(assessment)">Edit Assessment</button>
        <button (click)="deleteAssessment(assessment)">Delete Assessment</button>
      </div>
    </div>
  </div>
</div>

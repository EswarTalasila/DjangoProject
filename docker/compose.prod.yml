services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      app: {}

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE}
      DATABASE_URL: ${DATABASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MEDIA_ROOT: ${MEDIA_ROOT}
    volumes:
      - ../Taskfile.yml:/app/Taskfile.yml:ro
      - ../.env.template:/app/.env.template:ro
      - ../docker:/app/docker:ro
      - ../proxy:/app/proxy:ro
      - ../scripts:/app/scripts:ro
      - ../Docs:/app/Docs:ro
      - media-data:${MEDIA_ROOT}
      - artifact-data:${MEDIA_ROOT}/artifacts
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    command: gunicorn --bind 0.0.0.0:8000 config.wsgi:application
    healthcheck:
      test: ["CMD-SHELL", "python src/manage.py check >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      app: {}
      eelab-proxy:
        aliases:
          - eelab-prod-backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    restart: unless-stopped
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      SERVER_PROXY_ORIGIN: ${SERVER_PROXY_ORIGIN}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      app: {}
      eelab-proxy:
        aliases:
          - eelab-prod-frontend

volumes:
  db-data:
    name: eelab-prod-db-data
  media-data:
    name: eelab-prod-media-data
  artifact-data:
    name: eelab-prod-artifact-data

networks:
  app:
    name: eelab-prod-app
  eelab-proxy:
    external: true
    name: eelab-proxy

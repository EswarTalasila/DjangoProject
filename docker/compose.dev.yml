services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      app: {}

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: root
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE}
      DATABASE_URL: ${DATABASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MEDIA_ROOT: ${MEDIA_ROOT}
      FORCE_SCRIPT_NAME: ${FORCE_SCRIPT_NAME}
    volumes:
      - ../Taskfile.yml:/app/Taskfile.yml:cached
      - ../.env.template:/app/.env.template:cached
      - ../docker:/app/docker:cached
      - ../proxy:/app/proxy:cached
      - ../backend/src:/app/src:cached
      - ../backend/tests:/app/tests:cached
      - ../backend/pyproject.toml:/app/pyproject.toml:cached
      - ../scripts:/app/scripts:cached
      - ../Docs:/app/Docs:cached
      - media-data:${MEDIA_ROOT}
      - artifact-data:${MEDIA_ROOT}/artifacts
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    command: python src/manage.py runserver 0.0.0.0:8000
    healthcheck:
      test: ["CMD-SHELL", "python src/manage.py check >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      app: {}
      eelab-proxy:
        aliases:
          - eelab-dev-backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_BASE_PATH: ${NEXT_BASE_PATH}
      SERVER_PROXY_ORIGIN: ${SERVER_PROXY_ORIGIN}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    volumes:
      - ../frontend:/app:cached
      - frontend-node-modules:/app/node_modules
      - frontend-npm-cache:/root/.npm
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -c "if [ ! -x node_modules/.bin/next ] || [ ! -x node_modules/.bin/vitest ]; then
               npm ci --prefer-offline --no-audit;
             fi &&
             rm -f .next/dev/lock &&
             npm run dev"
    healthcheck:
      # Probe the login page under the profile's basePath ("" for prod,
      # "/_dev" for dev, "/_test" for test).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000${NEXT_BASE_PATH}/login || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      app: {}
      eelab-proxy:
        aliases:
          - eelab-dev-frontend

volumes:
  db-data:
    name: eelab-dev-db-data
  media-data:
    name: eelab-dev-media-data
  artifact-data:
    name: eelab-dev-artifact-data
  frontend-node-modules:
    name: eelab-dev-frontend-node-modules
  frontend-npm-cache:
    name: eelab-dev-frontend-npm-cache

networks:
  app:
    name: eelab-dev-app
  eelab-proxy:
    external: true
    name: eelab-proxy
